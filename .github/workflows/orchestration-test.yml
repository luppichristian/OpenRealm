name: Test Orchestration Layer

on:
  push:
    paths:
      - blockchain/**
      - .github/workflows/orchestration-test.yml
      - .github/workflows/orchestration-deploy.yml
  pull_request:
    paths:
      - blockchain/**
      - .github/workflows/orchestration-test.yml
      - .github/workflows/orchestration-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orchestration-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test Solidity contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build contract artifacts
        run: npm run build

      - name: Run contract tests
        run: npm test

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestration-contract-artifacts
          path: blockchain/artifacts
          if-no-files-found: error

  local-smoke-deploy:
    name: Smoke deploy to ephemeral Ganache
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: blockchain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build contract artifacts
        run: npm run build

      - name: Start local Ganache
        run: |
          npx ganache \
            --wallet.mnemonic "test test test test test test test test test test test junk" \
            --wallet.totalAccounts 10 \
            --chain.chainId 31337 \
            --server.host 127.0.0.1 \
            --server.port 8545 \
            > ganache.log 2>&1 &
          echo $! > ganache.pid

          for attempt in $(seq 1 30); do
            if node -e "fetch('http://127.0.0.1:8545', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'eth_chainId', params: [] }) }).then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"; then
              echo "Ganache is ready."
              exit 0
            fi
            sleep 1
          done

          echo "Ganache did not become ready."
          cat ganache.log
          exit 1

      - name: Deploy to local Ganache
        run: >-
          npm run deploy:local --
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          --owner 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266

      - name: Upload smoke deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestration-local-smoke-deployment
          path: |
            blockchain/artifacts
            blockchain/deployments/local.json
            blockchain/ganache.log
          if-no-files-found: error
