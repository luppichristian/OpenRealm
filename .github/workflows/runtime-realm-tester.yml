name: Runtime Realm Tester

on:
  push:
    paths:
      - '.github/workflows/runtime-realm-tester.yml'
      - 'blockchain/**'
      - 'docs/node_launcher.md'
      - 'docs/realm_tester.md'
      - 'node/runtime/**'
      - 'node_launcher/**'
      - 'project.bbs'
      - 'realms/test/**'
      - 'tester/**'
  pull_request:
    paths:
      - '.github/workflows/runtime-realm-tester.yml'
      - 'blockchain/**'
      - 'docs/node_launcher.md'
      - 'docs/realm_tester.md'
      - 'node/runtime/**'
      - 'node_launcher/**'
      - 'project.bbs'
      - 'realms/test/**'
      - 'tester/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-realm-tester-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-realm-tester:
    name: Build launcher/tester and run local runtime smoke test
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Build bbs
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/luppichristian/bbs.git ..\bbs-tool
          cd ..\bbs-tool
          call build_cl.bat

      - name: Install blockchain dependencies
        working-directory: blockchain
        run: npm install

      - name: Build contract artifacts
        working-directory: blockchain
        run: npm run build

      - name: Run contract tests
        working-directory: blockchain
        run: npm test

      - name: Start local Ganache
        working-directory: blockchain
        run: |
          npx ganache \
            --wallet.mnemonic "test test test test test test test test test test test junk" \
            --wallet.totalAccounts 10 \
            --chain.chainId 31337 \
            --server.host 127.0.0.1 \
            --server.port 8545 \
            > ganache.log 2>&1 &
          echo $! > ganache.pid

          for attempt in $(seq 1 30); do
            if node -e "fetch('http://127.0.0.1:8545', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'eth_chainId', params: [] }) }).then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"; then
              echo "Ganache is ready."
              exit 0
            fi
            sleep 1
          done

          echo "Ganache did not become ready."
          cat ganache.log
          exit 1

      - name: Deploy test realm contracts
        run: >-
          node realms/test/deploy.js
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          --owner 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266

      - name: Write runtime test config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          @'
          {
            "accountAddress": "0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266",
            "bindAddress": {
              "host": "127.0.0.1",
              "port": 46010
            },
            "enabled": false,
            "acceptsJoins": true,
            "position": {
              "x": 0.0,
              "y": 0.0,
              "z": 0.0
            },
            "areaOfInterest": {
              "radiusX": 96.0,
              "radiusY": 96.0,
              "radiusZ": 64.0
            },
            "join": {
              "maxCandidates": 6,
              "maxHops": 8
            },
            "limits": {
              "maxNodeConnections": 8,
              "maxKnownNodes": 64
            },
            "periodsMs": {
              "neighborRefresh": 250,
              "topologyBroadcast": 500,
              "playerBroadcast": 50
            },
            "receiveTimeoutMs": 50,
            "masterVolume": 0.5,
            "mouseSensitivity": 1.0,
            "invertMouseY": false,
            "showFps": true,
            "ticks": 0,
            "frames": 0,
            "frameTime": 0.016666667,
            "sleepMs": 16,
            "privateKey": "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
          }
          '@ | Set-Content -Path build/runtime-test-config.json

      - name: Build launcher and tester
        run: |
          ../bbs-tool/build/bbs.exe build -t openrealm_node_launcher
          ../bbs-tool/build/bbs.exe build -t openrealm_relay
          ../bbs-tool/build/bbs.exe build -t openrealm_simulator
          ../bbs-tool/build/bbs.exe build -t openrealm_realm_tester

      - name: Launch local runtime mesh
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $launcher = Join-Path $PWD 'build/default-windows-x86_64/bin/Debug/openrealm-node-launcher.exe'
          $launcherLog = Join-Path $PWD 'build/gha-launcher.log'
          $launcherErr = Join-Path $PWD 'build/gha-launcher.err.log'
          $nodeLauncherRoot = Join-Path $PWD 'build/node_launcher'
          $before = @()
          if (Test-Path $nodeLauncherRoot) {
            $before = Get-ChildItem $nodeLauncherRoot -Directory | Select-Object -ExpandProperty Name
          }

          $process = Start-Process -FilePath $launcher `
            -ArgumentList @(
              '--realm', 'test',
              '--config', 'build/runtime-test-config.json',
              '--relays', '2',
              '--simulators', '1',
              '--relay-base-port', '51001',
              '--sim-base-port', '51101',
              '--run-seconds', '45'
            ) `
            -RedirectStandardOutput $launcherLog `
            -RedirectStandardError $launcherErr `
            -PassThru
          Set-Content -Path build/gha-launcher.pid -Value $process.Id

          for ($attempt = 0; $attempt -lt 40; $attempt++) {
            $after = @()
            if (Test-Path $nodeLauncherRoot) {
              $after = Get-ChildItem $nodeLauncherRoot -Directory | Select-Object -ExpandProperty Name
            }
            $sessionDir = $after | Where-Object { $_ -notin $before } | Sort-Object | Select-Object -Last 1
            if ($sessionDir) {
              $jumpNodes = Join-Path $nodeLauncherRoot "$sessionDir/realm/jump_nodes.json"
              if (Test-Path $jumpNodes) {
                Add-Content -Path $env:GITHUB_ENV -Value "SESSION_DIR=$sessionDir"
                Write-Host "Detected session dir: $sessionDir"
                exit 0
              }
            }
            Start-Sleep -Seconds 1
          }

          Write-Host 'Launcher did not create a session realm in time.'
          if (Test-Path $launcherLog) { Get-Content $launcherLog }
          if (Test-Path $launcherErr) { Get-Content $launcherErr }
          exit 1

      - name: Run realm tester
        run: |
          ./build/default-windows-x86_64/bin/Debug/openrealm-realm-tester.exe \
            --config build/runtime-test-config.json \
            --realm-dir "build/node_launcher/$SESSION_DIR/realm" \
            --bind-port 51201 \
            --run-seconds 25 \
            --expect-topology-nodes 2 \
            > build/gha-tester.log 2>&1
          cat build/gha-tester.log

      - name: Stop launcher if still running
        if: ${{ always() }}
        run: |
          if [ -f build/gha-launcher.pid ]; then
            pid=$(cat build/gha-launcher.pid)
            kill "$pid" 2>/dev/null || true
          fi

      - name: Upload runtime test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-realm-tester-artifacts
          path: |
            build/gha-launcher.log
            build/gha-tester.log
            build/node_launcher/${{ env.SESSION_DIR }}
            blockchain/ganache.log
            blockchain/deployments/test.json
          if-no-files-found: warn
